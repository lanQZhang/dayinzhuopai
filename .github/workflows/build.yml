name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --icon=app_icon.ico --name=桌牌生成器 --add-data "card_core.py;." --add-data "app_icon.ico;." --hidden-import=pandas --hidden-import=openpyxl --hidden-import=reportlab --hidden-import=reportlab.pdfgen --hidden-import=reportlab.pdfbase --hidden-import=reportlab.pdfbase.ttfonts --hidden-import=reportlab.lib.pagesizes --hidden-import=reportlab.lib.units --hidden-import=tkinterdnd2 windows_build/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: namecard-generator-windows
          path: dist/桌牌生成器.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/桌牌生成器.exe
